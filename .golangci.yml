version: "2"
run:
  go: "1.25"
  modules-download-mode: readonly
  tests: true
output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - gosec
    - govet
    - ineffassign
    - misspell
    - nilerr
    - revive
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - unconvert
    - unused
    - whitespace
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
    gosec:
      excludes:
        - G104
        - G304
        - G404
    govet:
      disable:
        - fieldalignment
      enable-all: true
    misspell:
      locale: US
    revive:
      severity: warning
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
          arguments:
            - checkPrivateReceivers
            - disableStutteringCheck
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: unreachable-code
        - name: var-declaration
    staticcheck:
      checks:
        - all
  exclusions:
    generated: lax
    rules:
      - linters:
          - bodyclose
          - errcheck
          - gosec
        path: _test\.go
      - linters:
          - all
        path: \.pb\.go$
      - linters:
          - all
        path: _gen\.go$
      - linters:
          - revive
        text: should have comment
    paths:
      # WIP multi-tenant SaaS surface. It is not part of the shipped
      # self-hosted binary (cmd/xalgorix) and carries a large pre-existing
      # lint backlog; lint it separately once it stabilizes. The rest of the
      # module is held lint-clean.
      - internal/cloud
      - cmd/xalgorix-cloud
      - webui/node_modules
      - webui/dist
      - webui/build
      - internal/web/static
      - build
      - assets/webui
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - internal/cloud
      - cmd/xalgorix-cloud
      - webui/node_modules
      - webui/dist
      - webui/build
      - internal/web/static
      - build
      - assets/webui
      - third_party$
      - builtin$
      - examples$
